version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: docker-manager-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: docker_manager
      MYSQL_USER: docker_manager
      MYSQL_PASSWORD: secure_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - docker-manager-network
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  docker-manager-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docker-manager-ui
    restart: always
    ports:
      - "13000:13000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://docker_manager:secure_password@mysql:3306/docker_manager
      JWT_SECRET: your_jwt_secret_key_here_change_me
      VITE_APP_ID: your_app_id
      OAUTH_SERVER_URL: https://api.manus.im
      VITE_OAUTH_PORTAL_URL: https://manus.im/oauth
      OWNER_OPEN_ID: your_owner_id
      OWNER_NAME: Your Name
      BUILT_IN_FORGE_API_URL: https://api.manus.im
      BUILT_IN_FORGE_API_KEY: your_api_key
      VITE_FRONTEND_FORGE_API_KEY: your_frontend_key
      VITE_FRONTEND_FORGE_API_URL: https://api.manus.im
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - docker-manager-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13000"]
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
    driver: local

networks:
  docker-manager-network:
    driver: bridge
